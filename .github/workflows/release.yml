name: release

on:
  push:
    tags: [ v* ]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
    - name: Set up Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: '3.4'
        bundler-cache: true
    - name: Validate package
      run: bundle exec capsium package validate cap/
    - name: Package contents
      run: bundle exec capsium package pack -f cap/
    - name: Upload package to release
      uses: svenstaro/upload-release-action@v2
      with:
        repo_token: ${{ secrets.GITHUB_TOKEN }}
        file: '*.cap'
        file_glob: true
        tag: ${{ github.ref_name }}
        overwrite: true
        body: "Capsium package built from ${{ github.ref_name }}"
